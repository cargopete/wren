name = "wren"
version = "0.2.0"

description = "An ergonomic RabbitMQ / AMQP messaging library for Gleam, built on the BEAM and OTP."
licences = ["MIT"]
repository = { type = "github", user = "cargopete", repo = "wren" }
links = [{ title = "Changelog", href = "https://github.com/cargopete/wren/blob/main/CHANGELOG.md" }]

# Example programs carry `main` functions for local running, not library API.
internal_modules = ["wren/examples/*", "wren/demo"]

# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
amqp_client = ">= 4.2.1 and < 5.0.0"
gleam_otp = ">= 1.2.0 and < 2.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
